receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    send_batch_size: 8192
    timeout: 5s
    send_batch_max_size: 10240
  memory_limiter:
    check_interval: 1s
    limit_percentage: 75
    spike_limit_percentage: 15
  cumulativetodelta:

exporters:
  elasticsearch:
    endpoints: ["https://elasticsearch:9200"]
    user: "elastic"
    password: "Nitroz99@iam" # Match ELASTIC_PASSWORD in docker-compose
    tls:
      ca_file: /etc/otelcol-contrib/certs/ca/ca.crt
    logs_index: opentel-logs #logs-generic-otel
    logstash_format:
      enabled: true
      prefix_separator: "-"
      date_format: "%Y.%m.%d"
    sending_queue:
      enabled: true
      storage: file_storage
    retry:
      enabled: true
      initial_interval: 5s
      max_interval: 30s

  debug:
    verbosity: detailed

extensions:
  zpages:
    endpoint: 0.0.0.0:55679
  file_storage:
    directory: /var/lib/otelcol/storage

service:
  extensions: [zpages, file_storage]
  pipelines:
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [elasticsearch]

  telemetry:
    metrics:
      level: normal #detailed
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888

#      address: 0.0.0.0:8888
