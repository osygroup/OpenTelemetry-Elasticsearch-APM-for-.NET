version: '3.8'

networks:
  telemetry:
    driver: bridge

volumes:
  # --- UPDATED: Named volume mapped directly to a specific host path ---
  es_data:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/datalogs/elasticsearch'
  otel_storage:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/datalogs/otel_storage'
  certs:
    driver: local

services:
  # --- STEP 1: GENERATE TLS CERTIFICATES (Ephemeral Init Container) ---
  setup:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.18.0
    volumes:
      - certs:/usr/share/elasticsearch/config/certs
    user: "0"
    command: >
      bash -c '
        if [ ! -f config/certs/ca.zip ]; then
          echo "Creating CA";
          bin/elasticsearch-certutil ca --silent --pem -out config/certs/ca.zip;
          unzip config/certs/ca.zip -d config/certs;
        fi;
        if [ ! -f config/certs/certs.zip ]; then
          echo "Creating component certificates";
          echo -ne "instances:\n  - name: elasticsearch\n    dns:\n      - elasticsearch\n      - localhost\n" > config/certs/instances.yml;
          bin/elasticsearch-certutil cert --silent --pem -out config/certs/certs.zip --in config/certs/instances.yml --ca-cert config/certs/ca/ca.crt --ca-key config/certs/ca/ca.key;
          unzip config/certs/certs.zip -d config/certs;
        fi;
        echo "Setting file permissions";
        chown -R 1000:0 config/certs;
        echo "Setup complete!";
      '
    networks:
      - telemetry

  # --- STEP 2: ELASTICSEARCH DATA NODE ---
  elasticsearch:
    depends_on:
      setup:
        condition: service_completed_successfully
    image: docker.elastic.co/elasticsearch/elasticsearch:8.18.0
    container_name: elasticsearch
    volumes:
      - certs:/usr/share/elasticsearch/config/certs
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    environment:
      - node.name=elasticsearch
      - cluster.name=telemetry-cluster
      - discovery.type=single-node
      - ELASTIC_PASSWORD=Nitroz99@iam
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=true
      - xpack.security.http.ssl.key=certs/elasticsearch/elasticsearch.key
      - xpack.security.http.ssl.certificate=certs/elasticsearch/elasticsearch.crt
      - xpack.security.http.ssl.certificate_authorities=certs/ca/ca.crt
      - xpack.security.transport.ssl.enabled=true
      - xpack.security.transport.ssl.key=certs/elasticsearch/elasticsearch.key
      - xpack.security.transport.ssl.certificate=certs/elasticsearch/elasticsearch.crt
      - xpack.security.transport.ssl.certificate_authorities=certs/ca/ca.crt
      - xpack.security.transport.ssl.verification_mode=certificate
      - ES_JAVA_OPTS=-Xms4g -Xmx4g
    mem_limit: 9g
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      #test: ["CMD-SHELL", "curl -s --cacert config/certs/ca/ca.crt https://localhost:9200 | grep -q 'number'"]
      test: ["CMD-SHELL", "curl -s --cacert config/certs/ca/ca.crt -u elastic:Nitroz99@iam https://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - telemetry
    restart: unless-stopped

  # --- STEP 3: KIBANA (UI Dashboard) ---
  kibana:
    depends_on:
      elasticsearch:
        condition: service_healthy
    image: docker.elastic.co/kibana/kibana:8.18.0
    container_name: kibana
    volumes:
      - certs:/usr/share/kibana/config/certs
    ports:
      - "5601:5601"
    environment:
      - SERVERNAME=kibana
      - ELASTICSEARCH_HOSTS=https://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=Nitroz99@iam
      - ELASTICSEARCH_SSL_CERTIFICATEAUTHORITIES=config/certs/ca/ca.crt
      - XPACK_FLEET_OTEL_ENABLED=true
    mem_limit: 2g
    healthcheck:
      test: ["CMD-SHELL", "curl -s -I -f http://localhost:5601/api/status | grep -q 'HTTP/.* 200'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - telemetry
    restart: unless-stopped

  # --- STEP 4: OPENTELEMETRY COLLECTOR ---
  otel-collector:
    depends_on:
      elasticsearch:
        condition: service_healthy
    image: otel/opentelemetry-collector-contrib:0.140.1
    container_name: otel-collector
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
      - certs:/etc/otelcol-contrib/certs:ro
      - otel_storage:/var/lib/otelcol/storage
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
      - "55679:55679"
    mem_limit: 3g
    networks:
      - telemetry
    restart: unless-stopped

  # --- STEP 5: ELASTIC APM ---
  apm-server:
    depends_on:
      elasticsearch:
        condition: service_healthy
    image: docker.elastic.co/apm/apm-server:8.18.0
    container_name: apm-server
    volumes:
      - certs:/usr/share/apm-server/config/certs
    ports:
      - "8200:8200"
    command: >
      apm-server -e
         -E output.elasticsearch.hosts=["https://elasticsearch:9200"]
         -E output.elasticsearch.username=elastic
         -E output.elasticsearch.password=Nitroz99@iam
         -E output.elasticsearch.protocol=https
         -E output.elasticsearch.ssl.enabled=true
         -E output.elasticsearch.ssl.certificate_authorities=config/certs/ca/ca.crt
    networks:
      - telemetry
    restart: unless-stopped

